
type Compte {
  id:           String!
  proprietaire: String!
  email:        String!
  solde:        Float!
  type:         String!
  statut:       String!
  createdAt:    String!
}

type Transaction {
  id:           String!
  compteSource: String!
  compteDest:   String
  montant:      Float!
  type:         String!
  statut:       String!
  description:  String
  createdAt:    String!
}

type Notification {
  id:        String!
  compteId:  String!
  email:     String
  type:      String!
  message:   String!
  lue:       Boolean!
  createdAt: String!
}

type MutationResult {
  success: Boolean!
  message: String!
}

type Query {
  compte(id: String!): Compte
  comptes: [Compte!]!

  transaction(id: String!): Transaction
  transactions: [Transaction!]!
  transactionsDuCompte(compteId: String!): [Transaction!]!

  notificationsDuCompte(compteId: String!): [Notification!]!
  toutesLesNotifications: [Notification!]!
}

type Mutation {
  creerCompte(proprietaire: String!, email: String!, soldeInitial: Float, type: String): Compte!
  bloquerCompte(id: String!): Compte!
  supprimerCompte(id: String!): MutationResult!

  effectuerTransaction(
    compteSource: String!
    compteDest:   String
    montant:      Float!
    type:         String!
    description:  String
  ): Transaction!

  marquerNotificationLue(id: String!): Notification!
}
